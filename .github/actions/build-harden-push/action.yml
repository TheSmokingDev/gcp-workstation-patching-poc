name: Build, Harden & Push
description: Builds a user/team Dockerfile, applies the hardening layer, and pushes to Artifact Registry.

inputs:
  path:
    description: "Folder containing the Dockerfile (e.g. users/dev/s12345/r-geo)"
    required: true
  registry:
    description: "Artifact Registry host+repo (e.g. us-central1-docker.pkg.dev/my-project/workstation-images)"
    required: true
  image:
    description: "Top-level image name (e.g. codeoss)"
    required: true
  tag:
    description: "Image tag to apply (e.g. pr-42 or latest)"
    required: true

outputs:
  hardened_image:
    description: "Full image reference of the hardened image"
    value: ${{ steps.meta.outputs.hardened_image }}

runs:
  using: composite
  steps:
    - name: Resolve image references
      id: meta
      shell: bash
      run: |
        base="${{ inputs.registry }}/${{ inputs.image }}/${{ inputs.path }}"
        echo "base_image=${base}:${{ inputs.tag }}"           >> "$GITHUB_OUTPUT"
        echo "hardened_image=${base}:${{ inputs.tag }}-hardened" >> "$GITHUB_OUTPUT"
        echo "cache_ref=${base}:buildcache"                   >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build user/team image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.path }}
        push: true
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.base_image }}
        cache-from: type=registry,ref=${{ steps.meta.outputs.cache_ref }}
        cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max

    - name: Apply hardening layer
      uses: docker/build-push-action@v6
      with:
        context: hardening
        push: true
        platforms: linux/amd64
        build-args: BASE_IMAGE=${{ steps.meta.outputs.base_image }}
        tags: ${{ steps.meta.outputs.hardened_image }}
