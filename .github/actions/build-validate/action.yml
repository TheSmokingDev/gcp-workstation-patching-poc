name: Build & Validate
description: >
  Builds an image from either a config.json (generated Dockerfile) or a
  Dockerfile directly without pushing. Used for PR validation.

inputs:
  path:
    description: "Folder containing config.json or Dockerfile"
    required: true
  registry:
    description: "Artifact Registry host+repo (used for FROM resolution only)"
    required: true
  image:
    description: "Top-level image name (e.g. codeoss)"
    required: true

runs:
  using: composite
  steps:
    - name: Prepare Dockerfile
      id: dockerfile
      shell: bash
      run: |
        if [ -f "${{ inputs.path }}/config.json" ]; then
          extra_args=""
          if [[ "${{ inputs.path }}" == users/* ]]; then
            extra_args=$(echo "${{ inputs.path }}" | cut -d'/' -f2)
          fi
          python3 .github/scripts/generate-dockerfile.py \
            "${{ inputs.path }}/config.json" \
            "${{ inputs.registry }}" \
            "${{ inputs.image }}" \
            $extra_args \
            > /tmp/generated.Dockerfile
          echo "path=/tmp/generated.Dockerfile" >> "$GITHUB_OUTPUT"
          echo "=== Generated Dockerfile ==="
          cat /tmp/generated.Dockerfile
        elif [ -f "${{ inputs.path }}/Dockerfile" ]; then
          echo "path=${{ inputs.path }}/Dockerfile" >> "$GITHUB_OUTPUT"
        else
          echo "ERROR: No config.json or Dockerfile found in ${{ inputs.path }}" >&2
          exit 1
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image (no push)
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.path }}
        file: ${{ steps.dockerfile.outputs.path }}
        push: false
        platforms: linux/amd64
