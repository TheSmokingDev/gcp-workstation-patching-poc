name: Build Platform Images

# Builds platform/codeoss and platform/rstudio across all download-blocking
# combinations and pushes to dev Artifact Registry.
#
# GitHub Environment setup required:
#   Environment: dev
#     Secrets:  WIF_PROVIDER, SERVICE_ACCOUNT
#   Repository-level variables (Settings > Variables):
#     DEV_REGISTRY  e.g. us-central1-docker.pkg.dev/my-dev-project/workstation-images
#     IMAGE         e.g. codeoss

on:
  push:
    branches: [main]
    paths:
      - "platform/codeoss/Dockerfile"
      - "platform/rstudio/Dockerfile"
  workflow_dispatch:

jobs:
  build:
    name: "[${{ matrix.platform }}:${{ matrix.tag }}]"
    runs-on: ubuntu-latest
    environment: dev

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── codeoss variants ─────────────────────────────────────
          - platform: codeoss
            context: platform/codeoss
            block_codeoss: "true"
            block_rstudio: "true"
            tag: codeoss-locked--rstudio-locked
          - platform: codeoss
            context: platform/codeoss
            block_codeoss: "true"
            block_rstudio: "false"
            tag: codeoss-locked--rstudio-open
          - platform: codeoss
            context: platform/codeoss
            block_codeoss: "false"
            block_rstudio: "true"
            tag: codeoss-open--rstudio-locked
          - platform: codeoss
            context: platform/codeoss
            block_codeoss: "false"
            block_rstudio: "false"
            tag: codeoss-open--rstudio-open
          # ── rstudio variants ─────────────────────────────────────
          - platform: rstudio
            context: platform/rstudio
            block_codeoss: "true"
            block_rstudio: "true"
            tag: codeoss-locked--rstudio-locked
          - platform: rstudio
            context: platform/rstudio
            block_codeoss: "true"
            block_rstudio: "false"
            tag: codeoss-locked--rstudio-open
          - platform: rstudio
            context: platform/rstudio
            block_codeoss: "false"
            block_rstudio: "true"
            tag: codeoss-open--rstudio-locked
          - platform: rstudio
            context: platform/rstudio
            block_codeoss: "false"
            block_rstudio: "false"
            tag: codeoss-open--rstudio-open

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.DEV_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ vars.DEV_REGISTRY }}/${{ vars.IMAGE }}/${{ matrix.platform }}:${{ matrix.tag }}
          build-args: |
            BLOCK_CODEOSS_DOWNLOADS=${{ matrix.block_codeoss }}
            BLOCK_RSTUDIO_DOWNLOADS=${{ matrix.block_rstudio }}
          cache-from: type=registry,ref=${{ vars.DEV_REGISTRY }}/${{ vars.IMAGE }}/${{ matrix.platform }}:buildcache
          cache-to: type=registry,ref=${{ vars.DEV_REGISTRY }}/${{ vars.IMAGE }}/${{ matrix.platform }}:buildcache,mode=max
