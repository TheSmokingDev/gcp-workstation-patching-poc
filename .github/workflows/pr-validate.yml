name: PR Validate

on:
  pull_request:
    paths:
      - "users/**/config.json"
      - "teams/**/Dockerfile"
      - "teams/**/config.json"

jobs:
  detect:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build matrix
        id: detect
        run: |
          changed_users=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^users/[^/]*/[^/]*/config\.json$' \
            | sed 's|/config\.json$||' \
            || true)

          changed_teams=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^teams/[^/]*/[^/]*/(Dockerfile|config\.json)$' \
            | sed -E 's|/(Dockerfile|config\.json)$||' \
            | sort -u \
            || true)

          all=$(printf '%s\n%s' "$changed_users" "$changed_teams" | grep -v '^$' || true)

          if [ -z "$all" ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "has_changes=false"       >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix=$(echo "$all" \
            | jq -Rsc '[split("\n")[] | select(length > 0) | {path: .}] | {include: .}')

          echo "matrix=$matrix"   >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  build:
    name: "Validate ${{ matrix.path }}"
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Build (no push)
        id: build
        uses: ./.github/actions/build-validate
        with:
          path: ${{ matrix.path }}
          registry: ${{ vars.DEV_REGISTRY }}
          image: ${{ vars.IMAGE }}

      - name: Comment success on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ✅ Build validated for \`${{ matrix.path }}\``,
            });

      - name: Comment failure on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ❌ Build failed for \`${{ matrix.path }}\` — check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`,
            });
